<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | NRFSS</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0f0a] text-[#dce5d9] min-h-screen">
  <main class="max-w-4xl mx-auto p-8">
    <div class="rounded-xl border border-[#1e3a1e] bg-white/5 backdrop-blur p-6 space-y-6">
      <h1 class="text-3xl font-bold text-[#22c55e]">NRFSS Admin Console</h1>
      <div class="space-y-3">
        <button id="load-stats" class="px-5 py-3 rounded-lg bg-gradient-to-r from-[#16a34a] to-[#22c55e] text-black font-semibold">Load System Stats</button>
        <p id="stats-output" class="text-sm text-[#bccbb9]">No stats loaded yet.</p>
      </div>
      <div class="space-y-3">
        <label class="block text-sm">User ID to verify</label>
        <input id="verify-user-id" class="w-full bg-[#0d1a0d] border border-[#1a2e1a] p-3 rounded-lg" />
        <button id="verify-user-btn" class="px-5 py-3 rounded-lg border border-[#22c55e] text-[#22c55e]">Verify User</button>
      </div>
    </div>
  </main>
  <script src="./js/utils/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/admin.js"></script>
</body>
</html>
